<div class="container py-4">
  <div class="mb-3">
    <a routerLink="/" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-2"></i>
      Back to Posts
    </a>
  </div>

  <app-error-message 
    *ngIf="errorMessage" 
    [message]="errorMessage"
    (close)="errorMessage = ''">
  </app-error-message>

  <app-loading-spinner 
    *ngIf="isLoadingPost" 
    [message]="'Loading post...'"
    [size]="'large'">
  </app-loading-spinner>

  <!-- Post content -->
  <div *ngIf="!isLoadingPost && post" class="row">
    <div class="col-lg-8">
      <!-- Post card -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <!-- Post header -->
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h1 class="card-title mb-3">{{ post.title }}</h1>
              <div class="text-muted">
                <i class="bi bi-person me-1"></i>
                <span>{{ post.authorName }}</span>
                <span class="mx-2">•</span>
                <i class="bi bi-calendar me-1"></i>
                <span>{{ formatDate(post.createdAt) }}</span>
              </div>
            </div>
            
            <!-- Edit/Delete buttons (only for owner) -->
            <div *ngIf="isOwner()" class="btn-group">
              <a [routerLink]="['/edit-post', post.id]" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-pencil"></i>
              </a>
              <button (click)="deletePost()" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>

          <!-- Post tags -->
          <div class="mb-4" *ngIf="post.tags && post.tags.length > 0">
            <span *ngFor="let tag of post.tags" class="badge bg-secondary me-1">
              {{ tag }}
            </span>
          </div>

          <!-- Post content -->
          <div class="post-content mb-4">
            {{ post.content }}
          </div>

          <!-- Post statistics -->
          <div class="d-flex justify-content-between align-items-center pt-3 border-top">
            <!-- Reaction buttons -->
            <div class="btn-group">
              <button (click)="reactToPost(ReactionType.LIKE)" class="btn btn-outline-success">
                <i class="bi bi-hand-thumbs-up me-1"></i>
                Like ({{ post.likeCount }})
              </button>
              <button (click)="reactToPost(ReactionType.DISLIKE)" class="btn btn-outline-danger">
                <i class="bi bi-hand-thumbs-down me-1"></i>
                Dislike ({{ post.dislikeCount }})
              </button>
            </div>

            <!-- Rating badge -->
            <div>
              <span class="badge fs-6"
                    [ngClass]="{
                      'bg-success': getRatingPercentage(post.rating) >= 80,
                      'bg-warning': getRatingPercentage(post.rating) >= 50 && getRatingPercentage(post.rating) < 80,
                      'bg-danger': getRatingPercentage(post.rating) < 50
                    }">
                {{ getRatingPercentage(post.rating) }}% Rating
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Comments section -->
      <div class="card shadow-sm">
        <div class="card-header bg-light">
          <h5 class="mb-0">
            <i class="bi bi-chat-left-text me-2"></i>
            Comments ({{ post.commentCount }})
          </h5>
        </div>
        <div class="card-body">
          <!--
            Add Comment Component
            
            Reusable form for adding comments
            Emits submitComment event when user submits
            Parent handles API call and updates
          -->
          <app-add-comment
            [postId]="post.id"
            [isSubmitting]="isSubmittingComment"
            [errorMessage]="commentErrorMessage"
            (submitComment)="onSubmitComment($event)">
          </app-add-comment>

          <!--
            Comment List Component
          -->
          <app-comment-list
            [comments]="comments"
            [isLoading]="isLoadingComments">
          </app-comment-list>
        </div>
      </div>
    </div>

    <!-- Sidebar (optional - could add related posts, author info, etc.) -->
    <div class="col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h6 class="card-title">About the Author</h6>
          <p class="text-muted mb-0">{{ post.authorName }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
