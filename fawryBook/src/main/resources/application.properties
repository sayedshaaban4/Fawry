spring.application.name=fawryBook

# ==================== Oracle Database ====================
# Why Oracle: enterprise-grade, required by the project spec
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=sayed
spring.datasource.password=sayed
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==================== JPA / Hibernate ====================
# Why "update": auto-creates/updates tables from entities during development
# Change to "validate" in production to prevent accidental schema changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Why format_sql: makes Hibernate's logged SQL readable (indented) — easier to debug
spring.jpa.properties.hibernate.format_sql=true
# Why OracleDialect: tells Hibernate to generate Oracle-compatible SQL (IDENTITY columns, CLOB, sequences, etc.)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# ==================== JWT Configuration ====================
# Base64-encoded 256-bit secret key for HS256 signing
# Why Base64: safe ASCII string in config, decoded to raw bytes at runtime
# IMPORTANT: Replace this with a unique secret in production!
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgSldUIHNpZ25pbmcgMTIzNDU2Nzg5MA==
# Token validity: 86400000ms = 24 hours
# Why 24h: balances security (short-lived) with UX (user doesn't have to re-login constantly)
jwt.expiration=86400000

